<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EAAB6"/>
      <stop offset="50%" stop-color="#0C9DA8"/>
      <stop offset="100%" stop-color="#0A8A94"/>
    </linearGradient>
    <linearGradient id="sMain" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d0f0f4"/>
    </linearGradient>
    <linearGradient id="sAccent" x1="80%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#66BEC8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0EAAB6" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerShadow">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="2"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1"/>
      <feFlood flood-color="#065A60" flood-opacity="0.3"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with subtle depth -->
  <rect width="120" height="120" rx="26" fill="url(#bg)" filter="url(#innerShadow)"/>

  <!-- Subtle shine overlay -->
  <path d="M0 26 C0 11.6, 11.6 0, 26 0 L94 0 C108.4 0, 120 11.6, 120 26 L120 55 C80 65, 40 45, 0 55Z" fill="white" opacity="0.08" />

  <!-- Shadow S (depth layer) -->
  <path
    d="M74 28 C56 26, 36 32, 34 46 C32 58, 44 64, 56 67 C68 70, 86 74, 86 88 C86 100, 68 108, 48 106"
    fill="none" stroke="#065A60" stroke-width="15" stroke-linecap="round" opacity="0.25"
    transform="translate(1.5, 2)"
  />

  <!-- Main S stroke -->
  <path
    d="M74 28 C56 26, 36 32, 34 46 C32 58, 44 64, 56 67 C68 70, 86 74, 86 88 C86 100, 68 108, 48 106"
    fill="none" stroke="url(#sMain)" stroke-width="14" stroke-linecap="round" filter="url(#glow)"
  />

  <!-- Thin accent S (inner highlight) -->
  <path
    d="M74 28 C56 26, 36 32, 34 46 C32 58, 44 64, 56 67 C68 70, 86 74, 86 88 C86 100, 68 108, 48 106"
    fill="none" stroke="url(#sAccent)" stroke-width="6" stroke-linecap="round"
  />

  <!-- Sparkle dots -->
  <circle cx="80" cy="24" r="3.5" fill="white" opacity="0.85"/>
  <circle cx="88" cy="32" r="2" fill="white" opacity="0.5"/>
  <circle cx="42" cy="110" r="3.5" fill="white" opacity="0.85"/>
  <circle cx="34" cy="102" r="2" fill="white" opacity="0.5"/>
</svg>
