<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EAAB6"/>
      <stop offset="50%" stop-color="#0C9DA8"/>
      <stop offset="100%" stop-color="#0A8A94"/>
    </linearGradient>
    <linearGradient id="sMain" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d0f0f4"/>
    </linearGradient>
    <linearGradient id="sAccent" x1="80%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#66BEC8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0EAAB6" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerShadow">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="2"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1"/>
      <feFlood flood-color="#065A60" flood-opacity="0.3"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" rx="28" fill="url(#bg)" filter="url(#innerShadow)"/>

  <!-- Shine overlay -->
  <path d="M0 28 C0 12.5, 12.5 0, 28 0 L92 0 C107.5 0, 120 12.5, 120 28 L120 55 C80 65, 40 45, 0 55Z" fill="white" opacity="0.08" />

  <!-- Man in Suit Silhouette -->
  <g transform="translate(0, 4)">
    <!-- Head -->
    <circle cx="60" cy="38" r="15" fill="url(#sMain)" filter="url(#glow)"/>
    
    <!-- Shoulders / Suit Jacket -->
    <path d="M15 110 C15 75, 35 65, 60 65 C85 65, 105 75, 105 110 L105 110 L15 110 Z" fill="url(#sMain)" filter="url(#glow)"/>
    
    <!-- Lapels cutout (The "V" shape) -->
    <path d="M60 65 L35 110 L85 110 Z" fill="#0A8A94" opacity="0.35"/>
    
    <!-- Shirt (White V) -->
    <path d="M60 65 L48 95 L72 95 Z" fill="white"/>
    
    <!-- Tie -->
    <path d="M60 72 L56 78 L60 105 L64 78 Z" fill="#0EAAB6"/>
    <!-- Tie knot -->
    <path d="M57 72 L63 72 L62 77 L58 77 Z" fill="#0DA1AB"/>
  </g>

  <!-- Sparkle dots for premium look -->
  <circle cx="95" cy="25" r="3.5" fill="white" opacity="0.7"/>
  <circle cx="25" cy="95" r="2.5" fill="white" opacity="0.5"/>
</svg>
